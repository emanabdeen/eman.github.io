    <link rel="stylesheet" href="stycss\normalize.cssle.css">
    <link rel="stylesheet" href="css/feedback.css">
</head>
<body>
    <header>
        <img src="images\Titel image.png" alt="brown book with and feather pen"> <!--Pngegg. (n.d.). [Photograph]. https://www.pngegg.com/en/png-yhegn-->

    </header>

    <nav>

            </li>
            <li>
                <a href="feedback.html">Feedback</a>
            </li>
        </ul> 
    </nav>
    
    <main>   
        <section class="navarea">
            <a href="index.html"><figure>
                <img src="thumbnails\home.jpg" alt="gallery icon"> <!--Pngegg. (n.d.). [Photograph]. https://www.pngegg.com/en/png-cshxd-->
                <figcaption>HOME</figcaption>
            </figure></a>
            <a href="images.html"><figure>
                <img src="thumbnails\gallery.jpg" alt="images icon"> <!--Pngegg. (n.d.). [Photograph]. https://www.pngegg.com/en/png-eezxq-->
                <figcaption>GALLERY</figcaption>
            </figure></a>
            <a href="table.html"><figure>
                <img src="thumbnails\books.jpg" alt="book icon"> <!--Pngegg. (n.d.). [Photograph]. https://www.pngegg.com/en/png-ncmap-->
                <figcaption>BOOKS DATA</figcaption>
            </figure></a>
            <a href="feedback.html"><figure>
                <img src="thumbnails\form.jpg" alt="form icon"> <!--Pngegg. (n.d.). [Photograph]. https://www.pngegg.com/en/png-xnlbh-->
                <figcaption>FEEDBACK</figcaption>
            </figure></a>

        </section>
        <form action="feedback" method="post" class="formgrid">
            <article class="mainarea">
                <div class="textinput">
                    <label for="uname">Name:</label>
                    <input type="text" name="uname" id="uname" placeholder="First Last" tabindex="1" required pattern="[a-zA-Z]+\s[a-zA-Z]+">
                    <label for="uemail">Email:</label>
                    <input type="email" name="uemail" id="uemail" placeholder="xxxxx@gmail.com" tabindex="2" required >
                </div>
                <div class="selectinput">
                    <label for="glist">Types of books I am interested in</label>
                    <select  class="multiselect" name="glist" id="glist" tabindex="3">
                        <option value="">select option</option>
                        <optgroup label="Genre">
                            <option value="g1opA">Adventure</option>
                            <option value="g1opB">Romance</option>
                            <option value="g1opC">Fantasy</option>
                        </optgroup>
                        <optgroup label="Format">
                            <option value="g2opA">Paper Book</option>
                            <option value="g2opB">eBook</option>
                            <option value="g2opC">Audio Book</option>
                        </optgroup>

                    </select>
                </div>
                <div class="selectinput">
                    <label for="listbox">Authors I would like to hear about</label>
                    <select name="listbox" id="listbox" tabindex="4" multiple>
                        <option value="op1">J.K. Rowling</option>
                        <option value="op2">Virginia Woolf</option>
                        <option value="op3">Agatha Christie</option>
                        <option value="op4">Jane Austen</option>
                        <option value="op5">Roald Dahl</option>
                    </select>
                </div>
                <div class="textinput">
                    <label for="textarea">I would like to add...</label>
                    <textarea name="textarea" id="textarea" cols="50" rows="7" tabindex="5"></textarea>
                </div>
                <div class="buttons">
                    <div></div>
                    <button type="reset" tabindex="12">Reset</button>
                    <button type="submit" tabindex="13">Submit</button>
                </div>

            </article>
            <aside class="asidearea">
                <fieldset class="check">
                    <legend>I liked...</legend>
                    <input type="checkbox" name="content" id="content" tabindex="6">
                    <label for="content">Website content</label>
                    <input type="checkbox" name="design" id="design" tabindex="7">
                    <label for="design">Website design</label>
                    <input type="checkbox" name="use" id="use" tabindex="8">
                    <label for="use">Ease of use</label>
                    <input type="checkbox" name="nothing" id="nothing" tabindex="9">
                    <label for="nothing">No thing</label>
                </fieldset>
                <fieldset class="radio">
                    <legend>Did you find this website useful?</legend>
                    <div>
                        <input type="radio" name="radioselect" id="selectyes" tabindex="10">
                        <label for="selectyes">Yes</label>
                    </div>
                    <div>
                        <input type="radio" name="radioselect" id="selectno" tabindex="11">
                        <label for="selectno">No</label>
                    </div>

                    
                </fieldset> 
            </aside>
        </form>
    </main>

    <footer>
        <p> Books' Treasure &copy; 2021</p>
    </footer>
    
</body>
<Style>
        .fieldWrapper{
        display: grid;
        grid-template-columns: 1fr 3fr;
        grid-gap:10px;
    }
</Style>
</html>
